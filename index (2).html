<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Certiport GS6 Practice Exam (50 Qs / 50 Min)</title>
    <style>
        /* --- RESET & VARIABLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #f4f7fc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .app-container {
            max-width: 820px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0, 20, 50, 0.12);
            padding: 30px 35px 40px;
            transition: 0.2s;
        }
        h1 {
            font-size: 1.7rem;
            font-weight: 600;
            color: #0b1b33;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border-bottom: 2px solid #e9eff6;
            padding-bottom: 18px;
            margin-bottom: 20px;
        }
        .timer {
            background: #0b1b33;
            color: white;
            padding: 8px 22px;
            border-radius: 60px;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 1px;
            font-variant-numeric: tabular-nums;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
        }
        .timer.warning {
            background: #c0392b;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
        .progress-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
            color: #3d5a78;
            font-weight: 500;
            font-size: 0.95rem;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #dfe8f2;
            border-radius: 12px;
            margin-bottom: 28px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #2563eb;
            width: 2%;
            border-radius: 12px;
            transition: width 0.25s ease;
        }
        .question-header {
            font-weight: 600;
            color: #1e3a5f;
            font-size: 1rem;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }
        .question-text {
            font-size: 1.2rem;
            font-weight: 500;
            color: #0a1a2f;
            line-height: 1.5;
            margin-bottom: 24px;
        }
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 28px;
        }
        .option-item {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            background: #f8fafd;
            padding: 14px 18px;
            border-radius: 14px;
            border: 2px solid transparent;
            transition: 0.15s;
            cursor: pointer;
        }
        .option-item:hover {
            background: #edf3fa;
            border-color: #bdd3eb;
        }
        .option-item.selected {
            background: #dbeafe;
            border-color: #2563eb;
        }
        .option-item input {
            margin-top: 3px;
            accent-color: #2563eb;
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            cursor: pointer;
        }
        .option-item label {
            flex: 1;
            font-size: 1rem;
            color: #1d2b41;
            cursor: pointer;
            line-height: 1.4;
        }
        .nav-area {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        button {
            background: white;
            border: 2px solid #ccd9e9;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.95rem;
            color: #1f3a5e;
            cursor: pointer;
            transition: 0.15s;
            flex: 1 1 auto;
            min-width: 100px;
        }
        button:hover:not(:disabled) {
            background: #eef4fc;
            border-color: #8aadcf;
        }
        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .btn-primary {
            background: #2563eb;
            border-color: #2563eb;
            color: white;
            flex: 0 0 auto;
        }
        .btn-primary:hover:not(:disabled) {
            background: #1d4ed8;
            border-color: #1d4ed8;
        }
        .btn-submit {
            background: #0b1b33;
            border-color: #0b1b33;
            color: white;
            flex: 0 0 auto;
        }
        .btn-submit:hover:not(:disabled) {
            background: #1f3a5e;
        }
        .btn-danger {
            background: #dc2626;
            border-color: #dc2626;
            color: white;
        }
        .btn-danger:hover:not(:disabled) {
            background: #b91c1c;
        }
        .hidden {
            display: none !important;
        }

        /* --- RESULTS --- */
        #results {
            margin-top: 15px;
        }
        .result-summary {
            background: #f0f7ff;
            border-radius: 24px;
            padding: 30px 25px;
            text-align: center;
            margin-bottom: 30px;
            border: 2px solid #dbeafe;
        }
        .result-summary h2 {
            font-size: 2rem;
            color: #0b1b33;
        }
        .result-summary .score {
            font-size: 3.2rem;
            font-weight: 700;
            color: #2563eb;
        }
        .result-summary .sub {
            font-size: 1rem;
            color: #3d5a78;
        }
        .review-item {
            background: #f9fbfd;
            border-radius: 16px;
            padding: 18px 20px;
            margin-bottom: 14px;
            border-left: 6px solid #2563eb;
        }
        .review-item.correct {
            border-left-color: #16a34a;
            background: #f0fdf4;
        }
        .review-item.wrong {
            border-left-color: #dc2626;
            background: #fef2f2;
        }
        .review-item .q {
            font-weight: 600;
            margin-bottom: 4px;
        }
        .review-item .your-answer {
            font-size: 0.95rem;
            color: #333;
        }
        .review-item .correct-answer {
            font-size: 0.95rem;
            color: #16a34a;
            font-weight: 500;
        }
        .review-item .wrong-answer {
            font-size: 0.95rem;
            color: #dc2626;
            font-weight: 500;
        }

        @media (max-width: 550px) {
            .app-container {
                padding: 18px;
            }
            h1 {
                font-size: 1.3rem;
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }
            .timer {
                font-size: 1.4rem;
                text-align: center;
            }
            .question-text {
                font-size: 1rem;
            }
            button {
                padding: 10px 16px;
                font-size: 0.85rem;
                min-width: 70px;
            }
            .option-item {
                padding: 12px 14px;
            }
        }
    </style>
</head>
<body>

<div class="app-container" id="app">
    <h1>
        <span>📘 GS6 Practice</span>
        <span class="timer" id="timerDisplay">50:00</span>
    </h1>

    <!-- Progress -->
    <div class="progress-area">
        <span id="questionCounter">Question 1 of 50</span>
        <span id="answeredCounter">0 answered</span>
    </div>
    <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 2%;"></div>
    </div>

    <!-- QUIZ AREA -->
    <div id="quizArea">
        <div class="question-header" id="qType">Single Choice</div>
        <div class="question-text" id="qText">Loading question...</div>
        <div class="options-list" id="optionsContainer"></div>

        <div class="nav-area">
            <button id="prevBtn" disabled>◀ Previous</button>
            <button id="nextBtn">Next ▶</button>
            <button id="submitBtn" class="btn-submit">📤 Submit Exam</button>
        </div>
    </div>

    <!-- RESULTS AREA -->
    <div id="results" class="hidden">
        <div class="result-summary">
            <h2>✅ Exam Complete</h2>
            <div class="score" id="finalScore">0%</div>
            <div class="sub" id="finalDetail">0 / 50 correct</div>
            <br />
            <button id="restartBtn" class="btn-primary">🔄 Restart Practice</button>
        </div>
        <div id="reviewContainer"></div>
    </div>
</div>

<script>
    // ============================================================
    // 1. QUESTION BANK — 50 questions (Certiport GS6 Level 3 style)
    // ============================================================
    const QUESTIONS = [
        // --- 1. Email attachments ---
        { id: 1, type: 'single', question: 'Which file can you NOT send through a standard email provider (e.g., Gmail/Yahoo)?', options: ['30-frame 1080p animated GIF', '5-min podcast in MP3', '1-min 8K video in AVI', '400-page plain-text file'], answer: [2] },
        // --- 2. App support (v1) ---
        { id: 2, type: 'multi', question: 'You receive a question about an app. Which THREE responses are appropriate? (Choose 3.)', options: ['Send positive feedback with several entries', 'Provide clear and concise instructions', 'Help users find the app they are looking for', 'Share links to video content with useful steps', 'Send avatars/biographical information'], answer: [1, 2, 3] },
        // --- 3. App support (v2) ---
        { id: 3, type: 'multi', question: 'You receive a question about an app. Which THREE responses are appropriate? (Choose 3.)', options: ['Send annotated sequential screenshots', 'Provide clear and concise instructions', 'Share links to video content with useful steps', 'Notify them it is likely user error', 'Send positive message with several emojis'], answer: [0, 1, 2] },
        // --- 4. Group contribution ---
        { id: 4, type: 'multi', question: 'Select the THREE statements that best demonstrate productive group contribution. (Choose 3.)', options: ['Set a series of deadlines to keep members accountable', 'Do extra work to compensate for others', 'Agree with the teacher\'s recommendations on scope', 'Save discussion of deliverable format for later', 'Agree to norms for online group conversation'], answer: [0, 1, 4] },
        // --- 5. IP / Fair use ---
        { id: 5, type: 'single', question: 'Which action best demonstrates understanding of intellectual property when reusing someone\'s work?', options: ['Providing attribution after adhering to fair use', 'Crediting in bibliography instead of in-text citations', 'Using small portions assuming fair use', 'Modifying slightly and presenting as your own'], answer: [0] },
        // --- 6. Cross-platform software ---
        { id: 6, type: 'single', question: 'Which type of software can be used online AND with iOS / Android devices?', options: ['Mac OS', 'Windows 11', 'Microsoft 365', 'Chrome OS'], answer: [2] },
        // --- 7. Tech diagnosis ---
        { id: 7, type: 'single', question: 'A customer calls about a faulty older laptop. What is the BEST first step to understand the issue?', options: ['Explain it is probably too old to fix', 'Suggest buying a new laptop', 'Ask about any error messages', 'Tell them to come in for a refund'], answer: [2] },
        // --- 8. Protecting IP ---
        { id: 8, type: 'multi', question: 'Which TWO actions help protect individual and corporate intellectual property? (Choose 2.)', options: ['Place a watermark on shared content', 'Create a Creative Commons license with attribution', 'Put a disclaimer stating all content is your IP', 'Create a digital portfolio accessible to everyone'], answer: [0, 1] },
        // --- 9. Cloud documents (permissions) ---
        { id: 9, type: 'tf', question: 'Cloud documents can be configured to allow recipients to view, comment, or edit.', options: ['True', 'False'], answer: [0] },
        // --- 10. Cloud documents (upload) ---
        { id: 10, type: 'tf', question: 'Cloud documents must always be actively uploaded manually from your computer.', options: ['True', 'False'], answer: [1] },
        // --- 11. Chrome reset ---
        { id: 11, type: 'single', question: 'You want to return Google Chrome to default settings. Which menu command should you select?', options: ['You and Google', 'Appearance', 'Default browser', 'On startup', 'Reset and clean up'], answer: [4] },
        // --- 12. System requirements ---
        { id: 12, type: 'single', question: 'Laptop: 64-bit dual-core 2Ghz, 32GB RAM, 1920x1080, 2GB GPU. Which statement is correct?', options: ['Meets optimal requirements', 'Meets recommended requirements', 'Meets minimum requirements', 'Does NOT meet minimum requirements'], answer: [2] },
        // --- 13. Staying informed on threats ---
        { id: 13, type: 'multi', question: 'Which TWO practices keep you informed about digital threats for an app? (Choose 2.)', options: ['Subscribe to marketing offers', 'Follow independent social media accounts about digital tools', 'Review the publisher website once a year', 'Pay attention to app notifications for updates/TOS'], answer: [1, 3] },
        // --- 14. Communication skills ---
        { id: 14, type: 'multi', question: 'After a client says your team needs better communication, which TWO actions should you take? (Choose 2.)', options: ['Speak in a positive, respectful tone', 'Ask your teacher for specific feedback', 'Continue the same approach to improve with practice', 'Individually text the client to apologize', 'Have another team member take over communication'], answer: [0, 1] },
        // --- 15. Idea generation ---
        { id: 15, type: 'multi', question: 'Which TWO actions help the idea-generation process? (Choose 2.)', options: ['Withhold criticism of peers\' ideas', 'Only share ideas you are very confident about', 'Encourage wild ideas', 'Limit each member to one or two ideas'], answer: [0, 2] },
        // --- 16. E-waste facts ---
        { id: 16, type: 'tf', question: 'Over 60% of e-waste is properly recycled worldwide.', options: ['True', 'False'], answer: [1] },
        // --- 17. E-waste precious metals ---
        { id: 17, type: 'tf', question: 'E-waste contains precious metals like gold and silver that can be recovered.', options: ['True', 'False'], answer: [0] },
        // --- 18. Digital communications ---
        { id: 18, type: 'tf', question: 'In digital communication, you should avoid directly stating the purpose of the message.', options: ['True', 'False'], answer: [1] },
        // --- 19. Digital comms bullet points ---
        { id: 19, type: 'tf', question: 'Using bullet points or lists helps organize message details.', options: ['True', 'False'], answer: [0] },
        // --- 20. Digital comms acronyms ---
        { id: 20, type: 'tf', question: 'Use acronyms and abbreviations in all messages to keep them brief.', options: ['True', 'False'], answer: [1] },
        // --- 21. Constructive team traits ---
        { id: 21, type: 'multi', question: 'What are TWO traits of a constructive team member? (Choose 2.)', options: ['Confident', 'Rigorous', 'Opinionated', 'Inquisitive'], answer: [0, 3] },
        // --- 22. Cyclical design benefit ---
        { id: 22, type: 'single', question: 'What is a benefit of using a cyclical (iterative) design process for digital products?', options: ['Deliver final product quickly with few changes', 'Continually test and improve to achieve best result', 'Follow a strict schedule with definite deadline', 'Work independently without team input'], answer: [1] },
        // --- 23. Logical fallacies ---
        { id: 23, type: 'multi', question: 'A study guide story claims students improved 25% and quotes one professor saying "students must use this guide." Which TWO fallacies are present? (Choose 2.)', options: ['Ad hominem', 'False dilemma', 'Appeal to authority', 'Appeal to tradition'], answer: [1, 2] },
        // --- 24. DNS routing ---
        { id: 24, type: 'single', question: 'You received the wrong reply from your email server. Which command should you use to check DNS routing?', options: ['ping', 'tracert', 'telnet', 'nslookup'], answer: [3] },
        // --- 25. Fair use (political ad) ---
        { id: 25, type: 'single', question: 'You copy a 30-sec video clip. Which scenario is NOT fair use?', options: ['Use in a news report', 'Use to teach', 'Use in a political ad', 'Use in a parody'], answer: [2] },
        // --- 26. Fair use (podcast) ---
        { id: 26, type: 'single', question: 'You copy a video clip. Which is NOT fair use?', options: ['Use in a news report', 'Use to teach', 'Create a podcast that simply plays the clip', 'Create a parody'], answer: [2] },
        // --- 27. Automation (displacement) ---
        { id: 27, type: 'tf', question: 'Automation will displace some existing job roles.', options: ['True', 'False'], answer: [0] },
        // --- 28. Automation (new jobs) ---
        { id: 28, type: 'tf', question: 'Automation will lead to the creation of new job roles.', options: ['True', 'False'], answer: [0] },
        // --- 29. Automation (social tasks) ---
        { id: 29, type: 'tf', question: 'Activities that involve social interactions are MORE likely than others to be automated.', options: ['True', 'False'], answer: [1] },
        // --- 30. Cloud environment impact ---
        { id: 30, type: 'multi', question: 'In which TWO ways do cloud data centers negatively impact the environment? (Choose 2.)', options: ['Built in cold climates damaging polar habitats', 'Built in urban centers causing air pollution', 'Use significant electricity from non-renewable sources', 'Generate massive heat raising temperature of nearby water'], answer: [2, 3] },
        // --- 31. Design process order ---
        { id: 31, type: 'single', question: 'In a cyclical design process, what is the FIRST task?', options: ['Generate ideas', 'Develop the prototype', 'Identify project requirements', 'Test the prototype'], answer: [2] },
        // --- 32. Design process order (refine) ---
        { id: 32, type: 'single', question: 'After testing the prototype in a cyclical design process, what is the next step?', options: ['Generate new ideas', 'Refine the prototype', 'Identify requirements', 'Launch the final product'], answer: [1] },
        // --- 33. Online research (refine) ---
        { id: 33, type: 'tf', question: 'Refining your search terms is an effective online research practice.', options: ['True', 'False'], answer: [0] },
        // --- 34. Online research (Boolean) ---
        { id: 34, type: 'tf', question: 'Using Boolean operators (AND, OR, NOT) is an effective online research practice.', options: ['True', 'False'], answer: [0] },
        // --- 35. Hardware collaboration ---
        { id: 35, type: 'multi', question: 'Which THREE solutions are most helpful when solving a hardware issue with a team? (Choose 3.)', options: ['Focus on how tough the task is', 'Provide possible solutions', 'Provide reasons a solution is not possible', 'Share screenshots demonstrating the issue', 'Collaborate via team messaging with tips'], answer: [1, 3, 4] },
        // --- 36. Copyright ---
        { id: 36, type: 'single', question: 'Is an original image automatically protected by copyright the moment it is created?', options: ['Yes', 'No'], answer: [0] },
        // --- 37. Professional writing (patient discharge) ---
        { id: 37, type: 'tf', question: '"The patient was discharged home on the same day." is a clear, professional medical documentation statement.', options: ['True', 'False'], answer: [0] },
        // --- 38. New tech awareness (monetization) ---
        { id: 38, type: 'tf', question: 'Understanding monetization and employment practices helps you understand motivations behind online content.', options: ['True', 'False'], answer: [0] },
        // --- 39. New tech awareness (beta apps) ---
        { id: 39, type: 'tf', question: 'Using public beta applications can offer hints about industry technology trends.', options: ['True', 'False'], answer: [0] },
        // --- 40. Broadcast news rigor ---
        { id: 40, type: 'tf', question: 'Broadcast news has the highest standards in terms of coverage accuracy, timeliness, and rigor.', options: ['True', 'False'], answer: [1] },
        // --- 41. Debugging practice ---
        { id: 41, type: 'single', question: 'What is the most appropriate practice when debugging a website?', options: ['Yawning and sleeping', 'Writing comments in project code', 'Using browser developer tools to test sites', 'Only writing clear code'], answer: [2] },
        // --- 42. Cloud storage features ---
        { id: 42, type: 'tf', question: 'Cloud documents have version history to track changes over time.', options: ['True', 'False'], answer: [0] },
        // --- 43. Cloud document conversion ---
        { id: 43, type: 'tf', question: 'Cloud documents can be converted to other file types (e.g., Word to PDF).', options: ['True', 'False'], answer: [0] },
        // --- 44. Strong passwords (NEW) ---
        { id: 44, type: 'single', question: 'Which is the BEST example of a strong password?', options: ['Password123', 'MyDogFluffy', 'Tr0ub4dor&3!', '12345678'], answer: [2] },
        // --- 45. Video conference etiquette (NEW) ---
        { id: 45, type: 'single', question: 'During a video conference, which action is considered professional?', options: ['Mute microphone when not speaking', 'Eat lunch during the call', 'Visibly multitask on other devices', 'Always keep camera turned off'], answer: [0] },
        // --- 46. Two-factor authentication (NEW) ---
        { id: 46, type: 'single', question: 'What is the primary purpose of two-factor authentication (2FA)?', options: ['Increase download speed', 'Add an extra layer of security', 'Save files automatically', 'Share files publicly'], answer: [1] },
        // --- 47. EULA (NEW) ---
        { id: 47, type: 'single', question: 'What does an End-User License Agreement (EULA) typically define?', options: ['User rights and restrictions', 'Computer hardware specs', 'Internet speed required', 'Keyboard shortcuts'], answer: [0] },
        // --- 48. Digital footprint (NEW) ---
        { id: 48, type: 'single', question: 'Which is a permanent consequence of your online digital footprint?', options: ['Deleting a tweet removes it permanently', 'Archived data can be retrieved and used against you', 'Private accounts are completely invisible', 'Cookies are reset yearly'], answer: [1] },
        // --- 49. 3-2-1 Backup rule (NEW) ---
        { id: 49, type: 'single', question: 'What is the 3-2-1 backup rule?', options: ['3 copies, 2 different media, 1 offsite', '3 hard drives, 2 cables, 1 monitor', '3 files, 2 backups, 1 day', '3 passwords, 2 emails, 1 phone'], answer: [0] },
        // --- 50. Phishing (NEW) ---
        { id: 50, type: 'single', question: 'What is "phishing" in the context of cybersecurity?', options: ['A type of fishing game', 'A method to improve internet speed', 'A fraudulent attempt to obtain sensitive data', 'A hardware port on a computer'], answer: [2] }
    ];

    // ============================================================
    // 2. APP STATE
    // ============================================================
    const totalQ = QUESTIONS.length;
    let currentIndex = 0;
    let userAnswers = new Array(totalQ).fill(null); // stores array of selected indices
    let timerInterval = null;
    let timeLeft = 50 * 60; // 50 minutes in seconds
    let examSubmitted = false;

    const DOM = {
        timer: document.getElementById('timerDisplay'),
        counter: document.getElementById('questionCounter'),
        answered: document.getElementById('answeredCounter'),
        progress: document.getElementById('progressFill'),
        qType: document.getElementById('qType'),
        qText: document.getElementById('qText'),
        optionsContainer: document.getElementById('optionsContainer'),
        prevBtn: document.getElementById('prevBtn'),
        nextBtn: document.getElementById('nextBtn'),
        submitBtn: document.getElementById('submitBtn'),
        quizArea: document.getElementById('quizArea'),
        results: document.getElementById('results'),
        finalScore: document.getElementById('finalScore'),
        finalDetail: document.getElementById('finalDetail'),
        reviewContainer: document.getElementById('reviewContainer'),
        restartBtn: document.getElementById('restartBtn'),
    };

    // ============================================================
    // 3. RENDER FUNCTIONS
    // ============================================================
    function renderQuestion() {
        const q = QUESTIONS[currentIndex];
        const typeLabels = {
            single: '☝ Single Choice',
            multi: '☑ Multiple Choice',
            tf: '✔ True / False'
        };
        DOM.qType.textContent = typeLabels[q.type] || 'Question';
        DOM.qText.textContent = `${currentIndex+1}. ${q.question}`;

        const saved = userAnswers[currentIndex] || [];
        let html = '';
        q.options.forEach((opt, idx) => {
            const checked = saved.includes(idx) ? 'checked' : '';
            const inputType = (q.type === 'single' || q.type === 'tf') ? 'radio' : 'checkbox';
            const nameAttr = `q${currentIndex}`;
            html += `
                <div class="option-item ${checked ? 'selected' : ''}" data-idx="${idx}">
                    <input type="${inputType}" name="${nameAttr}" value="${idx}" ${checked} />
                    <label>${opt}</label>
                </div>
            `;
        });
        DOM.optionsContainer.innerHTML = html;

        // Attach click listeners to divs
        document.querySelectorAll('.option-item').forEach(div => {
            const input = div.querySelector('input');
            div.addEventListener('click', (e) => {
                if (e.target.tagName !== 'INPUT') {
                    input.click();
                }
            });
            input.addEventListener('change', (e) => {
                const val = parseInt(e.target.value);
                const qType = q.type;
                let current = userAnswers[currentIndex] || [];
                if (qType === 'single' || qType === 'tf') {
                    // radio: only one
                    if (e.target.checked) {
                        userAnswers[currentIndex] = [val];
                    } else {
                        userAnswers[currentIndex] = [];
                    }
                } else { // multi checkbox
                    if (e.target.checked) {
                        if (!current.includes(val)) current.push(val);
                    } else {
                        current = current.filter(v => v !== val);
                    }
                    userAnswers[currentIndex] = current;
                }
                // update visual
                document.querySelectorAll('.option-item').forEach(el => {
                    const cb = el.querySelector('input');
                    const idx = parseInt(el.dataset.idx);
                    const ans = userAnswers[currentIndex] || [];
                    if (ans.includes(idx)) {
                        el.classList.add('selected');
                        cb.checked = true;
                    } else {
                        el.classList.remove('selected');
                        cb.checked = false;
                    }
                });
                updateStats();
            });
        });

        // update nav buttons
        DOM.prevBtn.disabled = (currentIndex === 0);
        DOM.nextBtn.textContent = (currentIndex === totalQ - 1) ? 'Finish Review' : 'Next ▶';
        updateStats();
    }

    function updateStats() {
        const answered = userAnswers.filter(a => a !== null && a.length > 0).length;
        DOM.answered.textContent = `${answered} answered`;
        DOM.counter.textContent = `Question ${currentIndex+1} of ${totalQ}`;
        const pct = ((currentIndex + 1) / totalQ) * 100;
        DOM.progress.style.width = `${Math.min(pct, 100)}%`;
        // update submit button state
        DOM.submitBtn.disabled = (answered < totalQ);
    }

    // ============================================================
    // 4. NAVIGATION
    // ============================================================
    function goTo(index) {
        if (index < 0) index = 0;
        if (index >= totalQ) index = totalQ - 1;
        currentIndex = index;
        renderQuestion();
    }

    DOM.prevBtn.addEventListener('click', () => goTo(currentIndex - 1));
    DOM.nextBtn.addEventListener('click', () => {
        if (currentIndex === totalQ - 1) {
            // scroll to top and remind to submit
            window.scrollTo({ top: 0, behavior: 'smooth' });
            alert('You are at the last question. Click "Submit Exam" when you are ready.');
        } else {
            goTo(currentIndex + 1);
        }
    });

    // ============================================================
    // 5. TIMER
    // ============================================================
    function updateTimerDisplay() {
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        DOM.timer.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        if (timeLeft <= 60) DOM.timer.classList.add('warning');
        else DOM.timer.classList.remove('warning');
    }

    function startTimer() {
        if (timerInterval) return;
        timerInterval = setInterval(() => {
            timeLeft--;
            updateTimerDisplay();
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                timerInterval = null;
                alert('⏰ Time is up! Your exam will be submitted automatically.');
                submitExam();
            }
        }, 1000);
    }

    // ============================================================
    // 6. SUBMIT & RESULTS
    // ============================================================
    function submitExam() {
        if (examSubmitted) return;
        // confirm if not all answered and time > 0
        const answered = userAnswers.filter(a => a !== null && a.length > 0).length;
        if (answered < totalQ && timeLeft > 0) {
            if (!confirm(`You have answered ${answered} out of ${totalQ}. Are you sure you want to submit?`)) {
                return;
            }
        }
        examSubmitted = true;
        clearInterval(timerInterval);
        timerInterval = null;
        DOM.quizArea.classList.add('hidden');
        DOM.results.classList.remove('hidden');
        showResults();
    }

    DOM.submitBtn.addEventListener('click', submitExam);

    function showResults() {
        let correct = 0;
        const details = [];
        QUESTIONS.forEach((q, idx) => {
            const userAns = userAnswers[idx] || [];
            const correctAns = q.answer; // array of correct indices
            const isCorrect = userAns.length === correctAns.length && userAns.every(v => correctAns.includes(v));
            if (isCorrect) correct++;
            const userText = userAns.map(i => q.options[i]).join(', ') || '(none)';
            const correctText = correctAns.map(i => q.options[i]).join(', ');
            details.push({
                q: q.question,
                userText,
                correctText,
                isCorrect,
                type: q.type
            });
        });

        const pct = Math.round((correct / totalQ) * 100);
        DOM.finalScore.textContent = `${pct}%`;
        DOM.finalDetail.textContent = `${correct} / ${totalQ} correct`;

        let reviewHtml = '';
        details.forEach((d, i) => {
            const cls = d.isCorrect ? 'correct' : 'wrong';
            const mark = d.isCorrect ? '✅' : '❌';
            reviewHtml += `
                <div class="review-item ${cls}">
                    <div class="q">${mark} Q${i+1}: ${d.q}</div>
                    <div class="your-answer">Your answer: ${d.userText}</div>
                    <div class="${d.isCorrect ? 'correct-answer' : 'wrong-answer'}">
                        ${d.isCorrect ? '✔ Correct!' : `✖ Correct answer: ${d.correctText}`}
                    </div>
                </div>
            `;
        });
        DOM.reviewContainer.innerHTML = reviewHtml;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ============================================================
    // 7. RESTART
    // ============================================================
    DOM.restartBtn.addEventListener('click', () => {
        location.reload(); // simplest full reset
    });

    // ============================================================
    // 8. INIT
    // ============================================================
    function init() {
        // shuffle questions? (optional – uncomment if desired)
        // for (let i = QUESTIONS.length - 1; i > 0; i--) {
        //     const j = Math.floor(Math.random() * (i + 1));
        //     [QUESTIONS[i], QUESTIONS[j]] = [QUESTIONS[j], QUESTIONS[i]];
        // }
        // reset IDs
        QUESTIONS.forEach((q, i) => q.id = i + 1);

        renderQuestion();
        updateTimerDisplay();
        startTimer();
        updateStats();
    }

    init();
</script>
</body>
</html>
