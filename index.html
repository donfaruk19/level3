<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certiport Practice – Complete Bank (55 Qs)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .app-container {
      width: 100%;
      max-width: 1000px;
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.12);
      overflow: hidden;
      position: relative;
    }
    /* header */
    .app-header {
      background: #1a3a5c;
      color: #fff;
      padding: 16px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }
    .app-header h1 { font-size: 21px; font-weight: 600; letter-spacing: 0.3px; }
    .app-header .badge {
      background: rgba(255,255,255,0.18);
      padding: 4px 18px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 500;
    }
    /* mode toggle */
    .mode-toggle {
      display: flex;
      gap: 4px;
      background: #e8ecf1;
      padding: 4px;
      border-radius: 40px;
      margin: 14px 28px 0 28px;
    }
    .mode-toggle button {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 32px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      background: transparent;
      color: #3a4a5a;
    }
    .mode-toggle button.active {
      background: #1a3a5c;
      color: #fff;
      box-shadow: 0 2px 8px rgba(26,58,92,0.25);
    }
    .mode-toggle button:not(.active):hover { background: #d5dce6; }
    /* progress + palette row */
    .top-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 20px;
      align-items: center;
      padding: 12px 28px 4px 28px;
    }
    .progress-section { flex: 2; min-width: 180px; }
    .progress-bar-bg {
      background: #e8ecf1;
      border-radius: 40px;
      height: 8px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #2a7de1, #1a5cb5);
      border-radius: 40px;
      transition: width 0.4s ease;
    }
    .progress-text {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #5a6a7a;
      margin-top: 4px;
    }
    .palette-toggle {
      background: #eef3f9;
      border: none;
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 600;
      color: #1a3a5c;
      cursor: pointer;
      transition: 0.2s;
    }
    .palette-toggle:hover { background: #d5dce6; }
    .question-palette {
      display: none;
      flex-wrap: wrap;
      gap: 6px;
      padding: 8px 28px 12px 28px;
      background: #f8faff;
      border-bottom: 1px solid #e2e8f0;
    }
    .question-palette.open { display: flex; }
    .palette-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid #d5dce6;
      background: #fff;
      font-size: 13px;
      font-weight: 600;
      color: #2a3a4a;
      cursor: pointer;
      transition: 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .palette-btn:hover { border-color: #1a3a5c; background: #eaf1fb; }
    .palette-btn.active { border-color: #1a3a5c; background: #1a3a5c; color: #fff; }
    .palette-btn.answered { border-color: #1a9e5a; background: #e4f5ec; }
    .palette-btn.flagged { border-color: #f5a623; background: #fff3cd; }
    .palette-btn.answered.flagged { border-color: #f5a623; background: #fff3cd; }
    /* question area */
    .question-area { padding: 20px 28px 10px 28px; }
    .question-number {
      font-size: 14px;
      font-weight: 600;
      color: #1a3a5c;
      background: #eef3f9;
      display: inline-block;
      padding: 4px 16px;
      border-radius: 40px;
      margin-bottom: 12px;
    }
    .question-text {
      font-size: 18px;
      font-weight: 500;
      line-height: 1.6;
      color: #1a2a3a;
      margin-bottom: 20px;
    }
    .options-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 16px;
    }
    .option-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 14px 18px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.15s;
      background: #fafbfc;
    }
    .option-item:hover:not(.disabled) { border-color: #b0c4db; background: #f4f7fc; }
    .option-item.selected { border-color: #1a3a5c; background: #eaf1fb; }
    .option-item.correct { border-color: #1a9e5a; background: #e4f5ec; }
    .option-item.wrong { border-color: #d93a4a; background: #fde8eb; }
    .option-item.disabled { cursor: default; opacity: 0.85; }
    .option-item .marker {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid #b8c8da;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 14px;
      color: #3a4a5a;
      background: #fff;
      transition: 0.15s;
    }
    .option-item.selected .marker { border-color: #1a3a5c; background: #1a3a5c; color: #fff; }
    .option-item.correct .marker { border-color: #1a9e5a; background: #1a9e5a; color: #fff; }
    .option-item.wrong .marker { border-color: #d93a4a; background: #d93a4a; color: #fff; }
    .option-item .option-text {
      font-size: 16px;
      line-height: 1.5;
      color: #1a2a3a;
      padding-top: 2px;
    }
    /* explanation */
    .explanation-box {
      background: #f0f7ff;
      border-left: 5px solid #1a3a5c;
      padding: 16px 20px;
      border-radius: 10px;
      margin: 4px 0 16px 0;
      display: none;
    }
    .explanation-box.visible { display: block; }
    .explanation-box .exp-label { font-weight: 700; color: #1a3a5c; font-size: 14px; margin-bottom: 4px; }
    .explanation-box .exp-text { font-size: 15px; color: #2a3a4a; line-height: 1.5; }
    .explanation-box .exp-correct { color: #1a9e5a; font-weight: 600; }
    .explanation-box .exp-wrong { color: #d93a4a; font-weight: 600; }
    /* nav + flag */
    .nav-section {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 28px 20px 28px;
      gap: 10px;
      flex-wrap: wrap;
    }
    .nav-left { display: flex; gap: 8px; flex-wrap: wrap; }
    .nav-right { display: flex; gap: 8px; flex-wrap: wrap; }
    .nav-btn {
      padding: 9px 22px;
      border: none;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      background: #e8ecf1;
      color: #2a3a4a;
    }
    .nav-btn:hover:not(:disabled) { background: #d0d8e4; }
    .nav-btn.primary { background: #1a3a5c; color: #fff; }
    .nav-btn.primary:hover:not(:disabled) { background: #0f2a44; }
    .nav-btn.success { background: #1a9e5a; color: #fff; }
    .nav-btn.success:hover:not(:disabled) { background: #14804a; }
    .nav-btn.flag-btn { background: #fff3cd; color: #8a6d00; }
    .nav-btn.flag-btn:hover:not(:disabled) { background: #f5d742; }
    .nav-btn.flag-btn.flagged { background: #f5a623; color: #fff; }
    .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .timer-badge {
      background: #1a3a5c;
      color: #fff;
      padding: 4px 16px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    /* results */
    .results-container { padding: 20px 28px 30px 28px; }
    .results-summary {
      background: #f4f7fc;
      border-radius: 16px;
      padding: 24px 28px;
      text-align: center;
      margin-bottom: 24px;
    }
    .results-summary .score { font-size: 52px; font-weight: 700; color: #1a3a5c; }
    .results-summary .score-label { font-size: 18px; color: #3a5a6a; }
    .results-summary .pass-fail { font-size: 20px; font-weight: 600; margin-top: 6px; }
    .results-summary .pass-fail.pass { color: #1a9e5a; }
    .results-summary .pass-fail.fail { color: #d93a4a; }
    .result-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 14px;
      border-bottom: 1px solid #e8ecf1;
    }
    .result-item:last-child { border-bottom: none; }
    .result-item .r-icon { font-size: 22px; width: 36px; text-align: center; }
    .result-item .r-q { flex: 1; font-size: 15px; color: #1a2a3a; }
    .result-item .r-answer { font-size: 14px; color: #3a5a6a; font-weight: 500; }
    .result-item.correct-item { background: #f0f9f4; border-radius: 8px; }
    .result-item.wrong-item { background: #fdf0f2; border-radius: 8px; }
    .review-btn-wrap { text-align: center; padding: 6px 0 20px 0; }
    .review-btn-wrap .nav-btn { min-width: 160px; }
    /* responsive */
    @media (max-width: 640px) {
      .app-header { padding: 12px 16px; }
      .app-header h1 { font-size: 17px; }
      .mode-toggle { margin: 10px 16px 0 16px; }
      .mode-toggle button { font-size: 13px; padding: 8px 12px; }
      .top-bar { padding: 8px 16px 2px 16px; }
      .question-area { padding: 14px 16px 6px 16px; }
      .question-text { font-size: 16px; }
      .option-item { padding: 12px 14px; }
      .option-item .option-text { font-size: 15px; }
      .nav-section { padding: 6px 16px 16px 16px; flex-direction: column; align-items: stretch; }
      .nav-left, .nav-right { justify-content: center; }
      .nav-btn { width: 100%; justify-content: center; }
      .question-palette { padding: 8px 16px 12px 16px; }
      .palette-btn { width: 32px; height: 32px; font-size: 11px; }
      .results-container { padding: 14px 16px 20px 16px; }
      .results-summary .score { font-size: 38px; }
      .result-item { flex-wrap: wrap; }
    }
    .hidden { display: none !important; }
    .scroll-area {
      max-height: 70vh;
      overflow-y: auto;
      padding-right: 4px;
    }
    .scroll-area::-webkit-scrollbar { width: 5px; }
    .scroll-area::-webkit-scrollbar-track { background: #e8ecf1; border-radius: 8px; }
    .scroll-area::-webkit-scrollbar-thumb { background: #b0c4db; border-radius: 8px; }
    /* order drag */
    .order-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin: 12px 0;
    }
    .order-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      background: #fafbfc;
      cursor: grab;
      transition: 0.15s;
    }
    .order-item:hover { border-color: #b0c4db; background: #f4f7fc; }
    .order-item .drag-handle { font-size: 18px; color: #8a9aaa; cursor: grab; }
    .order-item .order-num { font-weight: 700; color: #1a3a5c; min-width: 28px; }
    .order-item.dragging { opacity: 0.5; border-style: dashed; }
    .order-item.drag-over { border-color: #1a3a5c; background: #eaf1fb; }
  </style>
</head>
<body>

<div class="app-container" id="app">
  <header class="app-header">
    <h1>📘 Certiport Practice</h1>
    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
      <span class="badge" id="modeBadge">Training</span>
      <span class="timer-badge" id="timerBadge">⏱ 0:00</span>
    </div>
  </header>

  <div class="mode-toggle">
    <button id="modeTraining" class="active" data-mode="training">📖 Training</button>
    <button id="modeTest" data-mode="test">📝 Test</button>
  </div>

  <div class="top-bar">
    <div class="progress-section">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
      <div class="progress-text">
        <span id="progressLabel">Question 1 of 55</span>
        <span id="progressPercent">0%</span>
      </div>
    </div>
    <button class="palette-toggle" id="paletteToggle">📋 Navigator</button>
  </div>

  <div class="question-palette" id="questionPalette"></div>

  <div class="scroll-area" id="scrollArea">
    <div class="question-area" id="questionArea"></div>
    <div class="explanation-box" id="explanationBox">
      <div class="exp-label">💡 Explanation</div>
      <div class="exp-text" id="explanationText"></div>
    </div>

    <div class="nav-section">
      <div class="nav-left">
        <button class="nav-btn" id="prevBtn" disabled>◀ Prev</button>
        <button class="nav-btn flag-btn" id="flagBtn">🚩 Flag</button>
      </div>
      <div class="nav-right">
        <button class="nav-btn" id="resetBtn">⟳ Reset</button>
        <button class="nav-btn primary" id="nextBtn">Next ▶</button>
        <button class="nav-btn success hidden" id="submitBtn">✔ Submit</button>
      </div>
    </div>
  </div>

  <div class="results-container hidden" id="resultsContainer"></div>
</div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  MASTER QUESTION BANK – 55 verified questions
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const QUESTIONS = [
  { id:'q1', number:1, text:'Which of the following files can you NOT send through a standard email provider such as Gmail or Yahoo?', type:'single', options:['A. A 30-frame 1080p-resolution animated GIF','B. A 5-minute podcast in MP3 format','C. A 1-minute 8K-resolution video in AVI format','D. A 400-page plain-text file'], correct:[2], explanation:'8K-resolution video in AVI format is extremely large (>25 MB), exceeding standard email attachment limits.' },
  { id:'q2', number:2, text:'Your group members need to be informed of a change in plans for the next meeting. Which response is the most efficient choice?', type:'single', options:['A. Post the change to your social media account','B. Send an email to your instructor','C. Send an email to the group about the change','D. Call them each individually'], correct:[2], explanation:'Sending a single email to the entire group is efficient, ensures everyone gets the same information, and creates a written record.' },
  { id:'q3', number:3, text:'For each of the three statements about improving the reach and success of a digital marketing campaign, select True or False.', type:'truefalse', options:['Use buttons linking to specific URLs in graphics or documents to increase traffic compared to text-based calls to action.','Using an A/B test is a good way to determine which messaging is most effective for moving audiences to action.','Use built-in analytics tools to discover what about the effectiveness of a medium or platform at driving traffic to a specific objective.'], correct:[true,true,true], explanation:'All three statements are correct: visual CTAs (buttons) outperform text links; A/B testing validates messaging; analytics tools provide critical performance data.' },
  { id:'q4', number:4, text:'You need to find drivers for a Windows 10 laptop. Device Manager shows "unknown device" for several components. What should you do?', type:'single', options:['A. From Device Manager, scan for hardware changes','B. Use the model number of the machine to locate the Drivers page on the laptop manufacturer\'s website','C. Restart the computer and use the Windows 10 repair tool','D. Purchase device driver software from the store where the computer was purchased'], correct:[1], explanation:'The most reliable method is to visit the manufacturer\'s support site using the laptop\'s model number to download the correct, signed drivers.' },
  { id:'q5', number:5, text:'You plan to sell your computer. You delete your personal files from your hard drive and then empty the Recycle Bin or Trash. What data remains on your hard drive?', type:'single', options:['A. All of it. The reference to the files on the hard drive remains. The file data remains.','B. None. The reference to the files on the hard drive and the file data are completely removed.','C. The reference to the files on the hard drive remains. The file data is completely removed.','D. The reference to the files on the hard drive is deleted. The file data remains.'], correct:[3], explanation:'Deleting files and emptying the Recycle Bin only removes the file system references (pointers). The actual file data remains on the disk until overwritten.' },
  { id:'q6', number:6, text:'Which action best demonstrates an understanding of intellectual property guidelines when reusing someone\'s work?', type:'single', options:['A. Providing attribution after adhering to fair use principles','B. Crediting the original source in a bibliography instead of using direct in-text citations','C. Using small portions of the work under the assumption that it falls under fair use','D. Making sure you modify the original work slightly and then present it as your own'], correct:[0], explanation:'Proper attribution combined with adherence to fair use principles is the correct approach.' },
  { id:'q7', number:7, text:'You receive a question about an app you are supporting. Which three responses are appropriate? (Choose 3.)', type:'multi', options:['A. Send annotated, sequential screenshots','B. Provide clear and concise instructions','C. Share links to video content with useful steps','D. Notify them that is likely user error','E. Send positive message with several emojis'], correct:[0,1,2], explanation:'Annotated screenshots, clear instructions, and video links are professional and helpful.' },
  { id:'q8', number:8, text:'Which two actions describe ways to protect individual and corporate intellectual property? (Choose 2.)', type:'multi', options:['A. Place a watermark over all publicly shared content','B. Create a Creative Commons license, allowing others to use your work with attribution','C. Put a disclaimer in all your posts stating that all content is your intellectual property','D. Create a digital portfolio that is accessible to everyone on the internet'], correct:[0,1], explanation:'Watermarks deter unauthorized use, and Creative Commons licenses provide a clear legal framework for sharing with attribution.' },
  { id:'q9', number:9, text:'For each of the four statements about documents using a cloud storage software as part of their workflow, determine whether statement is True or False.', type:'truefalse', options:['Cloud documents cannot function without an active internet connection.','Cloud documents have various degrees of security to control who does or does not have the ability to view them.','Cloud documents can be configured to allow the recipient to view the document, leave comments on the document, or change the document.','Cloud documents must always be actively uploaded from your computer to a cloud storage account.'], correct:[false,true,true,false], explanation:'Cloud documents can work offline with sync later (False). They have granular sharing permissions (True). They support view/comment/edit roles (True). They can auto-sync without manual upload (False).' },
  { id:'q10', number:10, text:'For each of the three statements about password sharing, select True or False.', type:'truefalse', options:['If you use someone else\'s password, your employer can restrict your future access to the company network.','Using a coworker\'s password to sign them into the company network because they are late for work is fraud.','If multiple people know a coworker\'s password and a security breach occurs, they could all be held responsible.'], correct:[true,true,true], explanation:'All three statements are correct. Password sharing violates security policies, can be considered fraud, and creates shared liability.' },
  { id:'q11', number:11, text:'Which two practices are recommended to help you stay informed about current digital threats, scams, and security breaches for a digital app that you use? (Choose 2.)', type:'multi', options:['A. Follow a variety of social media accounts that post independent content about digital tools.','B. Pay attention to app notifications for software updates and terms of use changes from the app publisher.','C. Subscribe to email alerts for the app publisher\'s latest marketing offers and special discounts.','D. Review the app publisher\'s website once a year for updates and news.'], correct:[0,1], explanation:'Following independent security sources (A) and monitoring official app notifications (B) are proactive ways to stay informed.' },
  { id:'q12', number:12, text:'For each of the four statements about e-waste, select True or False.', type:'truefalse', options:['Over 60% of e-waste is recycled.','E-waste is the slowest growing form of waste worldwide.','E-waste contains precious metals like gold and silver that can be recovered and reused.','E-waste contains toxic metals like lead and mercury that cause human illnesses if they leach into groundwater.'], correct:[false,false,true,true], explanation:'Only about 17-20% of e-waste is formally recycled (False). E-waste is actually the fastest-growing waste stream (False). It does contain valuable precious metals (True) and toxic substances (True).' },
  { id:'q13', number:13, text:'You are preparing a presentation on the population increase in your city over the years. You need to effectively represent the population growth over time. Which two types of visual representation would be most effective? (Choose 2.)', type:'multi', options:['A. Map','B. Bar graph','C. Line graph','D. Pie chart'], correct:[1,2], explanation:'Bar graphs and line graphs are ideal for showing trends over time.' },
  { id:'q14', number:14, text:'You customize your installation of Google Chrome. You are unhappy with some of the changes. You need to return Google Chrome to its default state by using only one command on the Settings menu shown. Which command should you select?', type:'single', options:['A. You and Google','B. Appearance','C. Default browser','D. On startup','E. Reset and clean up'], correct:[4], explanation:'The "Reset and clean up" section in Chrome Settings contains the "Restore settings to their original defaults" option.' },
  { id:'q15', number:15, text:'You encounter a video on social media that you suspect might be a deepfake generated by AI. For each of the four statements, select Yes if the action would help you determine if the video is fake or No if it would not.', type:'yesno', options:['Assume that because the video contains a statement unlikely to be said by the speaker that the video is trustworthy.','Search online for some of the specific quotes from the video to see if they are being featured by reputable news organizations.','Consider the motivations of the originators and sharers of the video.','Check the comments on the video to see if there are accusations of impropriety or other issues.'], correct:[false,true,true,true], explanation:'Assuming trustworthiness based on content alone is a mistake (No). Searching quotes, considering motivations, and checking comments are valid verification steps (Yes).' },
  { id:'q16', number:16, text:'You need to plan a project that will use a cyclical design process. In which order should you complete the project tasks?', type:'order', options:['Develop the prototype','Generate ideas','Identify project requirements','Refine the prototype','Test the prototype'], correct:[2,1,0,4,3], explanation:'Correct cyclical order: Identify requirements → Generate ideas → Develop prototype → Test → Refine.' },
  { id:'q17', number:17, text:'A story about a college test prep study guide appears in your social media news feed. The story contains the following information: "A recent study of 1000 students showed that students improved their test scores by 25% when they used this specific study guide. One renowned college professor associated with the study stated, \'If students do not use this guide, they might not earn the scores they need to be admitted to a college or university.\'" You identify two common logical fallacies in the content. Which two logical fallacies does the story contain? (Choose 2.)', type:'multi', options:['A. Ad hominem ("against the person"): attacking the person and not the issue','B. False dilemma: limiting the possible choices to avoid consideration of another choice','C. Appeal to authority: relying on one expert, named or unnamed, as the basis for an argument','D. Appeal to tradition: ignoring past problems and assuming that the way things were is better than they are now'], correct:[1,2], explanation:'False dilemma (B) presents only two options. Appeal to authority (C) relies on a single professor\'s statement.' },
  { id:'q18', number:18, text:'You copy a 30-second video clip from the internet. You do not know who created the video. Which scenario would NOT be fair use of the video clip?', type:'single', options:['A. You use the video clip as part of a news report','B. You use the video clip to teach','C. You create a political ad that includes the video clip','D. You create a parody that includes the video clip'], correct:[2], explanation:'Using the clip in a political ad is commercial/political use, which is less likely to be fair use.' },
  { id:'q19', number:19, text:'Which two video editing methods are used to alter videos to change the original meaning of the content? (Choose 2.)', type:'multi', options:['A. Identify the people in the video and the cameraperson in credits at the end of the video.','B. At the end of the video, show links to credible sources that support the message of the video.','C. Edit together pieces of different videos.','D. Show a brief clip of a longer segment of the video.'], correct:[2], explanation:'Editing together pieces from different videos (C) can fundamentally change meaning by creating false context.' },
  { id:'q20', number:20, text:'You want to make sure your laptop computer can run a new software application. The laptop has: 64-bit dual core 2Ghz CPU with SSE2 support, 32 GB RAM, 1920x1080 display, Graphics card with 2 GB RAM. Given the system requirements table, which statement is correct?', type:'single', options:['A. This laptop meets the optimal system requirements.','B. This laptop meets the recommended system requirements.','C. This laptop meets the minimum system requirements.','D. This laptop does not meet the minimum system requirements.'], correct:[2], explanation:'Minimum requires: 16 GB RAM, 1 GB graphics. Laptop has 32 GB RAM and 2 GB graphics → meets minimum. Recommended requires 4 GB graphics → laptop has only 2 GB, so fails recommended.' },
  { id:'q21', number:21, text:'For each of the four statements about digital communications with clients and coworkers, select True or False.', type:'truefalse', options:['Avoid directly stating the purpose of the message.','Use bullet points or lists to organize message details.','Use acronyms and abbreviations in all messages to keep them brief.','When you need a client to make a choice, provide multiple options to minimize back-and-forth.'], correct:[false,true,false,true], explanation:'You should state the purpose clearly (False). Bullet points improve readability (True). Overusing acronyms confuses clients (False). Providing options reduces back-and-forth (True).' },
  { id:'q22', number:22, text:'What is a benefit of using a cyclical design process to create digital products?', type:'single', options:['A. It allows you to deliver the final product as quickly as possible with few changes.','B. It allows you to continually test and improve the product to achieve the best possible result.','C. It allows you to follow a strict schedule with a definite ending deadline.','D. It allows you to work independently, without needing to ask for input from other team members.'], correct:[1], explanation:'Cyclical design (like Agile) emphasizes iterative testing and improvement, leading to a better final product.' },
  { id:'q23', number:23, text:'Which type of software can be used online and with iOS and Android devices?', type:'single', options:['A. Mac OS','B. Windows 11','C. Microsoft 365','D. Chrome OS'], correct:[2], explanation:'Microsoft 365 is a cloud-based suite that works on multiple platforms including iOS and Android.' },
  { id:'q24', number:24, text:'You are using Microsoft Word on a Windows 10 computer to write a paper about a company. The company name, ABusiness, begins with two capital letters. Each time you type the company name, the software corrects the capital letters. Where can you change this correction preference?', type:'single', options:['A. In the Grammar & Refinements settings.','B. In the computer operating system preferences.','C. In the AutoCorrect Options settings.','D. In the Office Language Preferences.'], correct:[2], explanation:'AutoCorrect options control automatic capitalization corrections in Microsoft Office.' },
  { id:'q25', number:25, text:'Your teacher has assigned a group project. Part of the grade includes evaluation of each team member\'s positive contributions. Select the three statements that best demonstrate your ability to contribute productively to a group. (Choose 3.)', type:'multi', options:['A. Set a series of deadlines throughout the project to keep all members accountable.','B. Do extra work to compensate for group members who are not doing their share.','C. Agree with your teacher\'s recommendations on the division for the project\'s scope.','D. Save discussion of deliverable format until a later meeting.','E. Agree to a set of norms concerning the online group conversation.'], correct:[0,2,4], explanation:'Setting deadlines (A), agreeing on scope (C), and establishing norms (E) are productive.' },
  { id:'q26', number:26, text:'You are trying to access a website, but it is not loading properly on your browser. What should you try first?', type:'single', options:['A. Clear the browser cache.','B. Email the website owner.','C. Check the BIOS settings.','D. Remove unnecessary apps.'], correct:[0], explanation:'Clearing the browser cache is the first and simplest step to resolve loading issues.' },
  { id:'q27', number:27, text:'For each of the four statements about technology-driven automation, select True or False.', type:'truefalse', options:['Automation will displace some existing job roles.','Automation will lead to the creation of new job roles.','Activities that include social interactions are more likely than others to be automated.','Activities that include physical tasks in predictable environments are more likely than others to be automated.'], correct:[true,true,false,true], explanation:'Automation displaces some roles and creates others. Social interactions are less likely to be automated; physical tasks in predictable environments are more likely.' },
  { id:'q28', number:28, text:'A classmate is asking for assistance editing a document to help improve readability when posted online. Which two options are the best ways to achieve that? (Choose 2.)', type:'multi', options:['A. Remind them to add accessibility features, like closed captions.','B. Encourage them to minimize the use of excessive punctuation and sentences that span multiple lines.','C. Have them check the text against the grade level it reads at to ensure alignment of message and audience.','D. Ensure that there is limited contrast between the type and the background to ensure readability on all types of screens.'], correct:[1,2], explanation:'Minimizing excessive punctuation and long sentences (B) and checking grade level (C) directly improve readability.' },
  { id:'q29', number:29, text:'Which two actions will improve the readability of a document? (Choose 2.)', type:'multi', options:['A. Set the line spacing so there is a slight distance between each line of text.','B. Type in all caps to make the text more uniform in appearance.','C. Select a font family that is unique, decorative, and in line with modern trends.','D. Carefully choose a font color with strong contrast against the background.','E. Use a small, compact font size to prevent paragraphs from breaking across pages.'], correct:[0,3], explanation:'Adequate line spacing (A) and strong contrast (D) greatly improve readability.' },
  { id:'q30', number:30, text:'Jackson is working at a tech store. A customer calls in to ask about a faulty laptop. The laptop is an older model, and there are newer, more updated versions available to purchase in the store. What is the best first step for Jackson to take to understand the issue?', type:'single', options:['A. Explain to the customer that the laptop is probably too old to fix.','B. Suggest that the customer buy a new laptop.','C. Ask the customer about any error messages.','D. Tell the customer to come into the store right away for a refund.'], correct:[2], explanation:'The first step in troubleshooting is to gather information. Asking about error messages helps diagnose the problem.' },
  { id:'q31', number:31, text:'Match each step in the media creation process with its description. (Order the descriptions to match Pre‑production, Post‑production, Distribution)', type:'order', options:['Scripting, storyboarding, and location scouting','Editing, applying effects, and adding captions','Uploading media to the desired platform'], correct:[0,1,2], explanation:'Pre‑production → Scripting, Post‑production → Editing, Distribution → Uploading.' },
  { id:'q32', number:32, text:'Which three actions are good strategies for being a successful member of a team? (Choose 3.)', type:'multi', options:['A. Share and accept feedback during the process.','B. Use team messaging to collaborate with tips and ideas.','C. Use reply all to keep everyone up to date.','D. Keep the discussion light and lively.','E. Never pressure team members about deadlines.','F. Be prompt and focused during meetings.'], correct:[0,1,5], explanation:'Sharing feedback (A), using team messaging (B), and being prompt/focused (F) are constructive.' },
  { id:'q33', number:33, text:'Isaac\'s online banking app asks for a code from his phone in addition to his password. What is this an example of?', type:'single', options:['A. A password reset prompt','B. Identity monitoring notification','C. Multifactor authentication','D. A phishing attempt'], correct:[2], explanation:'Requiring a code from a phone in addition to a password is a classic example of multifactor authentication (MFA).' },
  { id:'q34', number:34, text:'Which option is recommended to assist you in creating a secure password that you can remember?', type:'single', options:['A. Use parts of a random phrase.','B. Use your favorite color and favorite animal.','C. Use your social media profile name.','D. Use a name with a number at the end.'], correct:[0], explanation:'Using a random phrase is both secure and memorable. Personal information is easy to guess.' },
  { id:'q35', number:35, text:'For each of the four statements about contributing constructively to a project team, select Yes if the action is appropriate or No if it is not.', type:'yesno', options:['Offer to lead the group so you can steer the project\'s direction.','Avoid conflicts by agreeing with every suggestion.','Point out group members\' mistakes and offer to fix them.','Listen carefully to your teammates\' ideas before offering feedback.'], correct:[false,false,false,true], explanation:'Offering to lead may be seen as controlling (No). Agreeing with everything is not constructive (No). Pointing out mistakes can be helpful but often comes across as critical (No). Listening is always constructive (Yes).' },
  { id:'q36', number:36, text:'In which two ways do cloud computing data centers negatively impact the environment? (Choose 2.)', type:'multi', options:['A. They generate massive amounts of heat, which raises the temperature of nearby bodies of water.','B. They are often built in urban environments, which leads to increased air pollution.','C. They use a significant amount of electricity that is derived from non-renewable energy sources.','D. They are usually built in cold climates, damaging habitats for polar bears and other wildlife.'], correct:[0,2], explanation:'Data centers produce heat that can affect water temperatures (A) and consume large amounts of electricity, often from non-renewable sources (C).' },
  { id:'q37', number:37, text:'You lead a project team in your digital design class. You and your teammates will create a project for a local business. You arrange a virtual meeting with the business owner to discuss the project. You need to ensure that the business owner leaves the meeting with confidence that your team can successfully complete the project. Which three actions should you take? (Choose 3.)', type:'multi', options:['A. Include a lengthy discussion about the design applications you will use.','B. Tell the client that you will email a draft proposal that includes deadlines.','C. Discuss your career goals in the field of digital design.','D. After the client presents ideas, paraphrase what they said.','E. Decide with the client which forms of digital communication to use during the project.','F. Speak in a casual, informal manner to put the client at ease and encourage discussion.'], correct:[1,3,4], explanation:'Sending a proposal with deadlines (B), paraphrasing client ideas (D), and agreeing on communication methods (E) build confidence.' },
  { id:'q38', number:38, text:'You are the leader of a digital design team. Your team is creating a poster for a local fundraising event. You send a draft of the poster to the client. The client requests changes that you and your team members believe will affect the design. You need to communicate effectively with the client about the design changes. Which three actions should you take? (Choose 3.)', type:'multi', options:['A. Ask the client to explain the reasons for the changes and the impact they will have on the poster.','B. Tell the client you don\'t want to make the changes.','C. Tell the client that their ideas are not welcome.','D. Remind the client that your team has the knowledge and experience to create an effective final poster design.','E. Create a mockup of the poster with the client\'s changes and send it to the client.','F. Focus the discussion on the design choices, rather than your emotional response to the client\'s changes.'], correct:[0,4,5], explanation:'Asking for reasons (A), creating a mockup (E), and focusing on design (F) are professional.' },
  { id:'q39', number:39, text:'You post a video on your company\'s website. Site users complain that the video takes a long time to load. You need to decrease the video loading time. For each of the four actions, select Yes if it will make the video load faster or No if it will not.', type:'yesno', options:['Increase the video bitrate.','Convert the video to HTML5.','Decrease the video resolution.','Replace the video with an uncompressed version.'], correct:[false,true,true,false], explanation:'Increasing bitrate (No) and using uncompressed (No) increase file size. HTML5 (Yes) offers better compression, and lower resolution (Yes) reduces file size.' },
  { id:'q40', number:40, text:'Experts are concerned that society will lose some skills because of reliance on technology. Which three skills can become underutilized through the use of technology? (Choose 3.)', type:'multi', options:['A. Eye-hand coordination','B. Memorization','C. Mental math','D. Map navigation','E. Organization','F. Dexterity'], correct:[1,2,3], explanation:'Memorization (B), mental math (C), and map navigation (D) are often replaced by technology.' },
  { id:'q41', number:41, text:'You open a small business. You and your employees will use the Microsoft Office suite of productivity software. You need to decide whether to install the desktop apps or use the online version. What is a benefit of using a desktop app rather than a cloud app?', type:'single', options:['A. The up-front cost is less','B. The software does not depend on an internet connection','C. The software uses less hard disk drive storage space.','D. The software is updated more frequently.'], correct:[1], explanation:'Desktop apps work offline, unlike cloud apps which require an internet connection.' },
  { id:'q42', number:42, text:'For each of the four statements about web credibility, select True or False.', type:'truefalse', options:['Web pages are more credible if they cite sources for their content.','You know a source is reliable when the website address ends in .org','Consulting multiple sources is a good way to determine a site\'s accuracy.','A search engine differentiates between good and bad sites. The first results are usually the most reliable.'], correct:[true,false,true,false], explanation:'Citing sources (True) and consulting multiple sources (True) improve credibility. .org does not guarantee reliability (False), and search engine ranking is not a reliability indicator (False).' },
  { id:'q43', number:43, text:'After meeting with a client, the client told your teacher that your team needs to improve its communication skills. Which two actions should you take to improve your communication skills? (Choose 2.)', type:'multi', options:['A. Ask your teacher for feedback on which communication skills you need to improve.','B. Individually text the client to apologize for your poor communication.','C. Continue the same approach so your team can improve with practice.','D. When talking with the client, speak in a positive, respectful tone.','E. Have another team member take over the communication at the next meeting.'], correct:[0,3], explanation:'Seeking feedback (A) and speaking positively/respectfully (D) are constructive.' },
  { id:'q44', number:44, text:'Your school asks you to design a website to track participation in student clubs. You gather your team to generate ideas to solve the problem. Which two actions will help the idea-generation process? (Choose 2.)', type:'multi', options:['A. Withhold criticism of your peers\' ideas.','B. Only share ideas you\'re very confident about.','C. Encourage wild ideas.','D. Limit each team member to one or two ideas.'], correct:[0,2], explanation:'Withholding criticism (A) and encouraging wild ideas (C) foster creativity.' },
  { id:'q45', number:45, text:'You are adding all text to the images on your website. For each of the three types of information, select Yes if it is necessary to include it in the alt-text or No if it is not.', type:'yesno', options:['The image copyright','A brief description of the image','Context and details relevant to the image purpose'], correct:[false,true,true], explanation:'Copyright (No) is not needed in alt-text; a brief description (Yes) and context/details (Yes) are essential for accessibility.' },
  { id:'q46', number:46, text:'You are researching apples on the internet. For each of the four research topics, select Yes if a Boolean search will help to identify relevant results faster or No if it will not.', type:'yesno', options:['Apple varieties','History of apple agriculture','Recipes for apple pie or cake','Macintosh apples, but not the Macintosh computer'], correct:[false,false,true,true], explanation:'Simple searches like "apple varieties" (No) don\'t need Boolean; recipes (Yes) benefit from OR, and excluding a term (Yes) helps with Macintosh.' },
  { id:'q47', number:47, text:'For each of the three statements about practices designed to keep your knowledge and awareness of new technologies current, select whether it is True or False.', type:'truefalse', options:['Understanding monetization and employment practices will give you a better sense of the motivations behind the content that you consume online.','Using public beta applications can offer hints at adoption of industry trends and technology updates.','Due to editing and researching requirements, broadcast news has the highest standards in terms of coverage accuracy, timeliness and rigor.'], correct:[true,true,false], explanation:'Understanding monetization (True) and using betas (True) help stay current. Broadcast news does not always have the highest standards (False).' },
  { id:'q48', number:48, text:'You purchase a software program to complete a specific project. After you finish the project, a friend asks to borrow the program. You need to determine whether this is an acceptable use of the software. Where can you find this information?', type:'single', options:['A. Access Control List (ACL)','B. Content Management System (CMS)','C. Electronic Software Rating Board (ESRB)','D. End User License Agreement (EULA)'], correct:[3], explanation:'The EULA (End User License Agreement) specifies the terms of use, including whether sharing is allowed.' },
  { id:'q49', number:49, text:'What are two traits of a constructive team member? (Choose 2.)', type:'multi', options:['A. Confident','B. Rigorous','C. Opinionated','D. Inquisitive'], correct:[0,3], explanation:'Confidence (A) and inquisitiveness (D) are positive traits.' },
  { id:'q50', number:50, text:'For each of the three accessibility statements, select True if the statement is correct for web accessibility standards, or False if it is not.', type:'truefalse', options:['The preferred font style is sans serif.','The minimum recommended font size for website body text is 12 points.','You should maintain low contrast between the font color and the background color.'], correct:[true,false,false], explanation:'Sans serif fonts (True) are recommended for readability. 16px is preferred over 12 points (False). High contrast is required, not low (False).' },
  { id:'q51', number:51, text:'You need conduct various searches. Order the topics to match the search types: Informational, Navigation, Transactional.', type:'order', options:['A specific site','Third-party options to purchase software','Population statistics'], correct:[2,0,1], explanation:'Population statistics → Informational; A specific site → Navigation; Third-party options → Transactional.' },
  { id:'q52', number:52, text:'For each of the four statements about the presence of bias within information sources, evaluate whether it is True or False.', type:'truefalse', options:['Statements from official, verified accounts on social media are trustworthy and without bias.','The tone of an information source is important as it can lead to an outsized sense of imminence or impact.','The policies and views of publishers and media owners should be reported in a transparent and ethical way.','An eyewitness account of a news event is more likely to be credible than a source who must rely on others to provide information.'], correct:[false,true,true,false], explanation:'Official accounts can still be biased (False). Tone affects perception (True). Transparency is important (True). Eyewitness accounts are not always more credible (False).' },
  { id:'q53', number:53, text:'You need to maximize your online privacy. For each of the four actions, select Yes if it contributes to online privacy or No if it does not.', type:'yesno', options:['Stay logged into websites.','Delete cookies after using the browser.','Use the same password for multiple accounts.','Use Private Browsing mode to maintain anonymity.'], correct:[false,true,false,false], explanation:'Staying logged in (No) and using the same password (No) reduce privacy. Deleting cookies (Yes) helps. Private Browsing does not provide anonymity (No).' },
  { id:'q54', number:54, text:'Your team is working virtually on a group project. You want the group and the project to be successful. For each of the four statements about strategies for achieving success in a virtual group, select True or False.', type:'truefalse', options:['Have team members collect information in a shared document.','Increase efficiency by utilizing only asynchronous communication.','Create a team discussion board for project-related conversations.','Have a central file storage location that all team members can access.'], correct:[true,false,true,true], explanation:'Shared documents (True) and discussion boards (True) and central storage (True) are effective. Asynchronous-only (False) misses real-time collaboration benefits.' },
  { id:'q55', number:55, text:'Internet for facts and information to use for a research project, but your results are not giving you the answers you expected. For each of the three statements about online research, select whether it is Effective or Ineffective.', type:'effectiveineffective', options:['Refine your search terms to better match your topic','Paste the text of the assignment into a search engine','Use Boolean operators with the keywords in your search'], correct:[true,false,true], explanation:'Refining search terms (Effective) and using Boolean operators (Effective) are proven strategies. Pasting the entire assignment text (Ineffective) often returns irrelevant results.' }
];

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  APP STATE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const state = {
  mode: 'training',
  currentIndex: 0,
  selected: [],
  answers: [],
  flagged: [],
  isSubmitted: false,
  isReview: false,
  totalQuestions: QUESTIONS.length,
  orderState: {},
  timer: 0,
  timerInterval: null,
};

// Seed initial default answers to prevent unvisited order questions from breaking
QUESTIONS.forEach((q, idx) => {
  if (q.type === 'order') {
    state.orderState[idx] = q.options.map((_, i) => i);
    state.answers[idx] = [...state.orderState[idx]];
  } else {
    state.answers[idx] = null;
  }
  state.flagged[idx] = false;
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  DOM REFS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const $ = sel => document.querySelector(sel);
const $$ = sel => document.querySelectorAll(sel);

const questionArea = $('#questionArea');
const explanationBox = $('#explanationBox');
const explanationText = $('#explanationText');
const prevBtn = $('#prevBtn');
const nextBtn = $('#nextBtn');
const submitBtn = $('#submitBtn');
const resetBtn = $('#resetBtn');
const flagBtn = $('#flagBtn');
const progressFill = $('#progressFill');
const progressLabel = $('#progressLabel');
const progressPercent = $('#progressPercent');
const modeTraining = $('#modeTraining');
const modeTest = $('#modeTest');
const modeBadge = $('#modeBadge');
const timerBadge = $('#timerBadge');
const resultsContainer = $('#resultsContainer');
const scrollArea = $('#scrollArea');
const paletteToggle = $('#paletteToggle');
const questionPalette = $('#questionPalette');

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  RENDER
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function render() {
  if (state.isSubmitted && state.mode === 'test') {
    renderResults();
    return;
  }

  const q = QUESTIONS[state.currentIndex];
  const idx = state.currentIndex;
  const total = state.totalQuestions;

  // progress
  const pct = ((idx + 1) / total * 100);
  progressFill.style.width = pct + '%';
  progressLabel.textContent = `Question ${idx+1} of ${total}`;
  progressPercent.textContent = Math.round(pct) + '%';

  // question
  let html = `<div class="question-number">Question ${q.number} of ${total}</div>`;
  html += `<div class="question-text">${q.text}</div>`;

  if (q.type === 'single' || q.type === 'multi') {
    html += `<div class="options-container" id="optionsContainer">`;
    q.options.forEach((opt, oi) => {
      const selected = state.selected.includes(oi);
      let cls = 'option-item';
      if (state.mode === 'training' && state.selected.length > 0) {
        const isCorrect = q.correct.includes(oi);
        if (selected && isCorrect) cls += ' correct';
        else if (selected && !isCorrect) cls += ' wrong';
        else if (!selected && isCorrect) cls += ' correct';
      } else if (selected) {
        cls += ' selected';
      }
      const marker = String.fromCharCode(65 + oi);
      html += `<div class="${cls}" data-optindex="${oi}" data-qidx="${idx}"><div class="marker">${marker}</div><div class="option-text">${opt}</div></div>`;
    });
    html += `</div>`;
  } else if (q.type === 'truefalse') {
    html += `<div class="options-container" id="optionsContainer">`;
    q.options.forEach((statement, oi) => {
      const val = state.selected[oi] !== undefined ? state.selected[oi] : null;
      let cls = 'option-item tf-item';
      if (state.mode === 'training' && state.selected.some(v => v !== null && v !== undefined)) {
        const isCorrect = (val === q.correct[oi]);
        if (val !== null && isCorrect) cls += ' correct';
        else if (val !== null && !isCorrect) cls += ' wrong';
      } else if (val !== null) {
        cls += ' selected';
      }
      const label = val === true ? 'True' : val === false ? 'False' : '—';
      html += `<div class="${cls}" data-tfindex="${oi}" data-qidx="${idx}" style="justify-content:space-between;"><div class="option-text">${statement}</div><div style="display:flex; gap:12px; align-items:center;"><span style="font-weight:600; color:#3a5a6a;">${label}</span><span style="font-size:13px; color:#8a9aaa;">(click to toggle)</span></div></div>`;
    });
    html += `</div>`;
  } else if (q.type === 'yesno') {
    html += `<div class="options-container" id="optionsContainer">`;
    q.options.forEach((statement, oi) => {
      const val = state.selected[oi] !== undefined ? state.selected[oi] : null;
      let cls = 'option-item yn-item';
      if (state.mode === 'training' && state.selected.some(v => v !== null && v !== undefined)) {
        const isCorrect = (val === q.correct[oi]);
        if (val !== null && isCorrect) cls += ' correct';
        else if (val !== null && !isCorrect) cls += ' wrong';
      } else if (val !== null) {
        cls += ' selected';
      }
      const label = val === true ? 'Yes' : val === false ? 'No' : '—';
      html += `<div class="${cls}" data-ynindex="${oi}" data-qidx="${idx}" style="justify-content:space-between;"><div class="option-text">${statement}</div><div style="display:flex; gap:12px; align-items:center;"><span style="font-weight:600; color:#3a5a6a;">${label}</span><span style="font-size:13px; color:#8a9aaa;">(click to toggle)</span></div></div>`;
    });
    html += `</div>`;
  } else if (q.type === 'effectiveineffective') {
    html += `<div class="options-container" id="optionsContainer">`;
    q.options.forEach((statement, oi) => {
      const val = state.selected[oi] !== undefined ? state.selected[oi] : null;
      let cls = 'option-item eff-item';
      if (state.mode === 'training' && state.selected.some(v => v !== null && v !== undefined)) {
        const isCorrect = (val === q.correct[oi]);
        if (val !== null && isCorrect) cls += ' correct';
        else if (val !== null && !isCorrect) cls += ' wrong';
      } else if (val !== null) {
        cls += ' selected';
      }
      const label = val === true ? 'Effective' : val === false ? 'Ineffective' : '—';
      html += `<div class="${cls}" data-effindex="${oi}" data-qidx="${idx}" style="justify-content:space-between;"><div class="option-text">${statement}</div><div style="display:flex; gap:12px; align-items:center;"><span style="font-weight:600; color:#3a5a6a;">${label}</span><span style="font-size:13px; color:#8a9aaa;">(click to toggle)</span></div></div>`;
    });
    html += `</div>`;
  } else if (q.type === 'order') {
    const order = state.orderState[idx] || q.options.map((_, i) => i);
    html += `<div class="order-list" id="orderList">`;
    order.forEach((optIdx, pos) => {
      html += `<div class="order-item" data-optidx="${optIdx}" data-pos="${pos}" draggable="true"><span class="drag-handle">⠿</span><span class="order-num">${pos+1}.</span><span class="option-text">${q.options[optIdx]}</span></div>`;
    });
    html += `</div>`;
    if (state.mode === 'training' && state.answers[idx] !== null) {
      html += `<div style="margin-top:10px; font-size:14px; color:#1a9e5a; font-weight:500;">✓ Order locked for review</div>`;
    }
  }

  questionArea.innerHTML = html;

  // explanation
  const hasAnsweredTraining = (state.mode === 'training' && (
    ((q.type === 'single' || q.type === 'multi') && state.selected.length > 0) ||
    ((q.type === 'truefalse' || q.type === 'yesno' || q.type === 'effectiveineffective') && state.selected.some(v => v !== null && v !== undefined)) ||
    (q.type === 'order')
  ));

  if (hasAnsweredTraining) {
    let exp = q.explanation || 'No explanation provided.';
    let correctStr = '';
    if (q.type === 'single') correctStr = `Correct: ${String.fromCharCode(65 + q.correct[0])}`;
    else if (q.type === 'multi') correctStr = `Correct: ${q.correct.map(c => String.fromCharCode(65 + c)).join(', ')}`;
    else if (q.type === 'truefalse') correctStr = `Correct: ${q.correct.map(c => c ? 'True' : 'False').join(', ')}`;
    else if (q.type === 'yesno') correctStr = `Correct: ${q.correct.map(c => c ? 'Yes' : 'No').join(', ')}`;
    else if (q.type === 'effectiveineffective') correctStr = `Correct: ${q.correct.map(c => c ? 'Effective' : 'Ineffective').join(', ')}`;
    else if (q.type === 'order') correctStr = `Correct order: ${q.correct.map(c => q.options[c]).join(' → ')}`;
    explanationText.innerHTML = `<span class="exp-correct">${correctStr}</span><br><br>${exp}`;
    explanationBox.classList.add('visible');
  } else {
    explanationBox.classList.remove('visible');
  }

  // nav
  prevBtn.disabled = state.currentIndex === 0 || state.isSubmitted;
  if (state.mode === 'test' && state.currentIndex === state.totalQuestions - 1 && !state.isSubmitted) {
    submitBtn.classList.remove('hidden');
    nextBtn.classList.add('hidden');
  } else {
    submitBtn.classList.add('hidden');
    nextBtn.classList.remove('hidden');
  }

  // flag button
  flagBtn.textContent = state.flagged[idx] ? '★ Flagged' : '🚩 Flag';
  flagBtn.classList.toggle('flagged', state.flagged[idx]);

  resetBtn.textContent = state.isSubmitted ? '⟳ Retake' : '⟳ Reset';

  // palette
  renderPalette();
  attachEvents();
}

function renderPalette() {
  const total = state.totalQuestions;
  let html = '';
  for (let i = 0; i < total; i++) {
    const q = QUESTIONS[i];
    let cls = 'palette-btn';
    if (i === state.currentIndex) cls += ' active';
    if (state.flagged[i]) cls += ' flagged';
    const ans = state.answers[i];
    let answered = false;
    if (q.type === 'single' || q.type === 'multi') {
      answered = (ans && ans.length > 0);
    } else if (q.type === 'truefalse' || q.type === 'yesno' || q.type === 'effectiveineffective') {
      answered = (ans && ans.some(v => v !== null && v !== undefined));
    } else if (q.type === 'order') {
      answered = true; // Always has a default arrangement order
    }
    if (answered) cls += ' answered';
    html += `<button class="${cls}" data-palette="${i}">${i+1}</button>`;
  }
  questionPalette.innerHTML = html;
  
  document.querySelectorAll('.palette-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      const idx = parseInt(this.dataset.palette);
      if (state.mode === 'test' && state.isSubmitted) return;
      state.currentIndex = idx;
      loadQuestion(idx);
    });
  });
}

function attachEvents() {
  const q = QUESTIONS[state.currentIndex];
  const idx = state.currentIndex;

  if (q.type === 'single' || q.type === 'multi') {
    document.querySelectorAll('.option-item:not(.disabled)').forEach(el => {
      el.addEventListener('click', function() {
        if (state.isSubmitted || (state.mode === 'test' && state.isReview)) return;
        const optIdx = parseInt(this.dataset.optindex);
        handleOptionClick(idx, optIdx, q.type);
      });
    });
  }
  if (q.type === 'truefalse') {
    document.querySelectorAll('.tf-item:not(.disabled)').forEach(el => {
      el.addEventListener('click', function() {
        if (state.isSubmitted || (state.mode === 'test' && state.isReview)) return;
        const tfIdx = parseInt(this.dataset.tfindex);
        handleTFClick(idx, tfIdx);
      });
    });
  }
  if (q.type === 'yesno') {
    document.querySelectorAll('.yn-item:not(.disabled)').forEach(el => {
      el.addEventListener('click', function() {
        if (state.isSubmitted || (state.mode === 'test' && state.isReview)) return;
        const ynIdx = parseInt(this.dataset.ynindex);
        handleYNClick(idx, ynIdx);
      });
    });
  }
  if (q.type === 'effectiveineffective') {
    document.querySelectorAll('.eff-item:not(.disabled)').forEach(el => {
      el.addEventListener('click', function() {
        if (state.isSubmitted || (state.mode === 'test' && state.isReview)) return;
        const effIdx = parseInt(this.dataset.effindex);
        handleEffClick(idx, effIdx);
      });
    });
  }
  if (q.type === 'order' && !(state.mode === 'test' && state.isSubmitted)) {
    setupOrderDrag(idx);
  }
}

function handleOptionClick(qIdx, optIdx, type) {
  if (state.mode === 'test' && state.isSubmitted) return;
  if (type === 'single') {
    state.selected = [optIdx];
  } else {
    const pos = state.selected.indexOf(optIdx);
    if (pos === -1) state.selected.push(optIdx);
    else state.selected.splice(pos, 1);
    state.selected.sort((a,b) => a-b);
  }
  state.answers[qIdx] = [...state.selected];
  render();
}

function handleTFClick(qIdx, tfIdx) {
  if (state.mode === 'test' && state.isSubmitted) return;
  if (state.selected[tfIdx] === undefined || state.selected[tfIdx] === null) state.selected[tfIdx] = true;
  else if (state.selected[tfIdx] === true) state.selected[tfIdx] = false;
  else state.selected[tfIdx] = null;
  state.answers[qIdx] = [...state.selected];
  render();
}

function handleYNClick(qIdx, ynIdx) {
  if (state.mode === 'test' && state.isSubmitted) return;
  if (state.selected[ynIdx] === undefined || state.selected[ynIdx] === null) state.selected[ynIdx] = true;
  else if (state.selected[ynIdx] === true) state.selected[ynIdx] = false;
  else state.selected[ynIdx] = null;
  state.answers[qIdx] = [...state.selected];
  render();
}

function handleEffClick(qIdx, effIdx) {
  if (state.mode === 'test' && state.isSubmitted) return;
  if (state.selected[effIdx] === undefined || state.selected[effIdx] === null) state.selected[effIdx] = true;
  else if (state.selected[effIdx] === true) state.selected[effIdx] = false;
  else state.selected[effIdx] = null;
  state.answers[qIdx] = [...state.selected];
  render();
}

function setupOrderDrag(qIdx) {
  const list = document.getElementById('orderList');
  if (!list) return;
  const items = list.querySelectorAll('.order-item');
  let dragItem = null;
  items.forEach(item => {
    item.addEventListener('dragstart', function(e) {
      if (state.mode === 'test' && state.isSubmitted) { e.preventDefault(); return; }
      dragItem = this;
      this.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', this.dataset.pos);
    });
    item.addEventListener('dragend', function(e) {
      this.classList.remove('dragging');
      document.querySelectorAll('.order-item.drag-over').forEach(el => el.classList.remove('drag-over'));
    });
    item.addEventListener('dragover', function(e) {
      e.preventDefault();
      if (state.mode === 'test' && state.isSubmitted) return;
      document.querySelectorAll('.order-item.drag-over').forEach(el => el.classList.remove('drag-over'));
      this.classList.add('drag-over');
    });
    item.addEventListener('dragleave', function(e) { this.classList.remove('drag-over'); });
    item.addEventListener('drop', function(e) {
      e.preventDefault();
      this.classList.remove('drag-over');
      if (state.mode === 'test' && state.isSubmitted) return;
      if (!dragItem || dragItem === this) return;
      const fromPos = parseInt(dragItem.dataset.pos);
      const toPos = parseInt(this.dataset.pos);
      const order = state.orderState[qIdx] || QUESTIONS[qIdx].options.map((_,i) => i);
      const [removed] = order.splice(fromPos, 1);
      order.splice(toPos, 0, removed);
      state.orderState[qIdx] = order;
      state.answers[qIdx] = [...order];
      render();
    });
  });

  // touch support
  let touchStartIndex = null, touchItem = null;
  items.forEach(item => {
    item.addEventListener('touchstart', function(e) {
      if (state.mode === 'test' && state.isSubmitted) return;
      touchStartIndex = parseInt(this.dataset.pos);
      touchItem = this;
      this.classList.add('dragging');
    }, { passive: true });
    item.addEventListener('touchmove', function(e) {
      e.preventDefault();
      if (!touchItem) return;
      const touch = e.touches[0];
      const dropTarget = document.elementFromPoint(touch.clientX, touch.clientY);
      if (dropTarget && dropTarget.closest('.order-item')) {
        const target = dropTarget.closest('.order-item');
        document.querySelectorAll('.order-item.drag-over').forEach(el => el.classList.remove('drag-over'));
        target.classList.add('drag-over');
      }
    }, { passive: false });
    item.addEventListener('touchend', function(e) {
      if (!touchItem) return;
      const target = document.querySelector('.order-item.drag-over');
      if (target && target !== touchItem) {
        const fromPos = touchStartIndex;
        const toPos = parseInt(target.dataset.pos);
        const order = state.orderState[qIdx] || QUESTIONS[qIdx].options.map((_,i) => i);
        const [removed] = order.splice(fromPos, 1);
        order.splice(toPos, 0, removed);
        state.orderState[qIdx] = order;
        state.answers[qIdx] = [...order];
        render();
      }
      touchItem.classList.remove('dragging');
      document.querySelectorAll('.order-item.drag-over').forEach(el => el.classList.remove('drag-over'));
      touchItem = null;
      touchStartIndex = null;
    }, { passive: true });
  });
}

function goToPrev() {
  if (state.currentIndex > 0) { state.currentIndex--; loadQuestion(state.currentIndex); }
}
function goToNext() {
  if (state.currentIndex < state.totalQuestions - 1) { state.currentIndex++; loadQuestion(state.currentIndex); }
}

function loadQuestion(idx) {
  const q = QUESTIONS[idx];
  const saved = state.answers[idx];
  if (saved !== null && saved !== undefined) {
    if (q.type === 'single' || q.type === 'multi' || q.type === 'truefalse' || q.type === 'yesno' || q.type === 'effectiveineffective') {
      state.selected = [...saved];
    } else if (q.type === 'order') {
      state.orderState[idx] = [...saved];
      state.selected = [];
    }
  } else {
    if (q.type === 'single' || q.type === 'multi') state.selected = [];
    else if (q.type === 'truefalse' || q.type === 'yesno' || q.type === 'effectiveineffective') state.selected = new Array(q.options.length).fill(null);
    else if (q.type === 'order') {
      state.orderState[idx] = q.options.map((_,i) => i);
      state.selected = [];
    }
  }
  render();
  scrollArea.scrollTop = 0;
}

function toggleFlag() {
  const idx = state.currentIndex;
  state.flagged[idx] = !state.flagged[idx];
  render();
}

function startTimer() {
  if (state.timerInterval) return;
  state.timer = 0;
  state.timerInterval = setInterval(() => {
    state.timer++;
    const mins = Math.floor(state.timer / 60);
    const secs = state.timer % 60;
    timerBadge.textContent = `⏱ ${mins}:${secs.toString().padStart(2, '0')}`;
  }, 1000);
}

function stopTimer() {
  if (state.timerInterval) {
    clearInterval(state.timerInterval);
    state.timerInterval = null;
  }
}

function submitTest() {
  let allAnswered = true;
  QUESTIONS.forEach((qq, i) => {
    const ans = state.answers[i];
    if (qq.type === 'single' || qq.type === 'multi') {
      if (!ans || ans.length === 0) allAnswered = false;
    } else if (qq.type === 'truefalse' || qq.type === 'yesno' || qq.type === 'effectiveineffective') {
      if (!ans || ans.length === 0 || ans.every(v => v === null || v === undefined)) allAnswered = false;
    }
  });

  if (!allAnswered && !confirm('You have unanswered questions. Submit anyway?')) return;
  state.isSubmitted = true;
  stopTimer();
  render();
}

function renderResults() {
  const total = QUESTIONS.length;
  let correctCount = 0;
  let results = [];

  QUESTIONS.forEach((q, i) => {
    const userAns = state.answers[i];
    let isCorrect = false;
    let userDisplay = '';
    let correctDisplay = '';

    if (q.type === 'single') {
      if (userAns && userAns.length === 1) { 
        isCorrect = userAns[0] === q.correct[0]; 
        userDisplay = String.fromCharCode(65 + userAns[0]); 
      } else userDisplay = 'Not answered';
      correctDisplay = String.fromCharCode(65 + q.correct[0]);
    } else if (q.type === 'multi') {
      if (userAns && userAns.length > 0) {
        const sorted = [...userAns].sort();
        const correctSorted = [...q.correct].sort();
        isCorrect = sorted.length === correctSorted.length && sorted.every((v,idx) => v === correctSorted[idx]);
        userDisplay = userAns.map(c => String.fromCharCode(65 + c)).join(', ');
      } else userDisplay = 'Not answered';
      correctDisplay = q.correct.map(c => String.fromCharCode(65 + c)).join(', ');
    } else if (q.type === 'truefalse') {
      if (userAns) {
        isCorrect = userAns.every((v, idx) => v === q.correct[idx]);
        userDisplay = userAns.map(v => v === true ? 'True' : v === false ? 'False' : '—').join(', ');
      } else userDisplay = 'Not answered';
      correctDisplay = q.correct.map(v => v ? 'True' : 'False').join(', ');
    } else if (q.type === 'yesno') {
      if (userAns) {
        isCorrect = userAns.every((v, idx) => v === q.correct[idx]);
        userDisplay = userAns.map(v => v === true ? 'Yes' : v === false ? 'No' : '—').join(', ');
      } else userDisplay = 'Not answered';
      correctDisplay = q.correct.map(v => v ? 'Yes' : 'No').join(', ');
    } else if (q.type === 'effectiveineffective') {
      if (userAns) {
        isCorrect = userAns.every((v, idx) => v === q.correct[idx]);
        userDisplay = userAns.map(v => v === true ? 'Effective' : v === false ? 'Ineffective' : '—').join(', ');
      } else userDisplay = 'Not answered';
      correctDisplay = q.correct.map(v => v ? 'Effective' : 'Ineffective').join(', ');
    } else if (q.type === 'order') {
      if (userAns) {
        isCorrect = userAns.every((val, idx) => val === q.correct[idx]);
        userDisplay = userAns.map(idx => q.options[idx]).join(' → ');
      } else userDisplay = 'Not answered';
      correctDisplay = q.correct.map(idx => q.options[idx]).join(' → ');
    }

    if (isCorrect) correctCount++;
    results.push({ question: q.text, userDisplay, correctDisplay, isCorrect, number: q.number });
  });

  const score = Math.round((correctCount / total) * 100);
  const passed = score >= 70;

  let html = `
    <div class="results-summary">
      <div class="score">${score}%</div>
      <div class="score-label">${correctCount} of ${total} correct</div>
      <div class="pass-fail ${passed ? 'pass' : 'fail'}">${passed ? '✅ PASS' : '❌ FAIL'}</div>
      <div style="margin-top:8px; font-size:14px; color:#5a6a7a;">⏱ Time: ${timerBadge.textContent.replace('⏱ ','')}</div>
    </div>
    <div style="margin-bottom:12px; font-weight:600; color:#1a3a5c;">Review Answers</div>
  `;

  results.forEach((r, i) => {
    const cls = r.isCorrect ? 'correct-item' : 'wrong-item';
    const icon = r.isCorrect ? '✅' : '❌';
    html += `
      <div class="result-item ${cls}">
        <div class="r-icon">${icon}</div>
        <div class="r-q"><strong>Q${r.number}:</strong> ${r.question.substring(0, 80)}${r.question.length > 80 ? '…' : ''}</div>
        <div class="r-answer">Your: ${r.userDisplay}</div>
        <div class="r-answer" style="color:#1a9e5a;">Correct: ${r.correctDisplay}</div>
      </div>
    `;
  });

  html += `
    <div class="review-btn-wrap">
      <button class="nav-btn primary" id="retakeBtn">⟳ Retake Test</button>
      <button class="nav-btn" id="backToQuestionsBtn" style="margin-left:8px;">⬅ Back to Questions</button>
    </div>
  `;

  resultsContainer.innerHTML = html;
  resultsContainer.classList.remove('hidden');
  questionArea.classList.add('hidden');
  explanationBox.classList.remove('visible');
  document.querySelector('.progress-section').classList.add('hidden');
  document.querySelector('.nav-section').classList.add('hidden');
  submitBtn.classList.add('hidden');
  nextBtn.classList.add('hidden');
  modeBadge.textContent = '✅ Results';

  document.getElementById('retakeBtn')?.addEventListener('click', resetAll);
  document.getElementById('backToQuestionsBtn')?.addEventListener('click', function() {
    state.isSubmitted = false;
    state.isReview = false;
    resultsContainer.classList.add('hidden');
    questionArea.classList.remove('hidden');
    document.querySelector('.progress-section').classList.remove('hidden');
    document.querySelector('.nav-section').classList.remove('hidden');
    modeBadge.textContent = state.mode === 'training' ? 'Training' : 'Test';
    render();
  });
}

function resetAll() {
  if (state.mode === 'test' && state.isSubmitted) {
    if (!confirm('Reset all answers and start over?')) return;
  }
  stopTimer();
  state.currentIndex = 0;
  state.selected = [];
  state.answers = [];
  state.isSubmitted = false;
  state.isReview = false;
  state.flagged = state.flagged.map(() => false);
  state.orderState = {};
  state.timer = 0;
  timerBadge.textContent = '⏱ 0:00';
  QUESTIONS.forEach((q, i) => {
    if (q.type === 'order') {
      state.orderState[i] = q.options.map((_, idx) => idx);
      state.answers[i] = [...state.orderState[i]];
    } else {
      state.answers[i] = null;
    }
  });
  if (state.mode === 'test') startTimer();
  resultsContainer.classList.add('hidden');
  questionArea.classList.remove('hidden');
  document.querySelector('.progress-section').classList.remove('hidden');
  document.querySelector('.nav-section').classList.remove('hidden');
  submitBtn.classList.add('hidden');
  nextBtn.classList.remove('hidden');
  modeBadge.textContent = state.mode === 'training' ? 'Training' : 'Test';
  loadQuestion(0);
}

function switchMode(mode) {
  if (state.mode === mode) return;
  if (state.mode === 'test' && !state.isSubmitted && state.answers.some(a => a !== null)) {
    if (!confirm('Switching modes will discard your current configuration. Continue?')) return;
  }
  stopTimer();
  state.mode = mode;
  state.isSubmitted = false;
  state.isReview = false;
  state.selected = [];
  state.answers = [];
  state.flagged = state.flagged.map(() => false);
  state.orderState = {};
  state.timer = 0;
  timerBadge.textContent = '⏱ 0:00';
  QUESTIONS.forEach((q, i) => {
    if (q.type === 'order') {
      state.orderState[i] = q.options.map((_, idx) => idx);
      state.answers[i] = [...state.orderState[i]];
    } else {
      state.answers[i] = null;
    }
  });
  state.currentIndex = 0;
  resultsContainer.classList.add('hidden');
  questionArea.classList.remove('hidden');
  document.querySelector('.progress-section').classList.remove('hidden');
  document.querySelector('.nav-section').classList.remove('hidden');
  submitBtn.classList.add('hidden');
  nextBtn.classList.remove('hidden');
  modeTraining.classList.toggle('active', mode === 'training');
  modeTest.classList.toggle('active', mode === 'test');
  modeBadge.textContent = mode === 'training' ? 'Training' : 'Test';
  
  if (mode === 'test') startTimer();
  loadQuestion(0);
}

document.addEventListener('DOMContentLoaded', function() {
  modeTraining.addEventListener('click', () => switchMode('training'));
  modeTest.addEventListener('click', () => switchMode('test'));
  prevBtn.addEventListener('click', goToPrev);
  nextBtn.addEventListener('click', goToNext);
  submitBtn.addEventListener('click', submitTest);
  resetBtn.addEventListener('click', resetAll);
  flagBtn.addEventListener('click', toggleFlag);
  paletteToggle.addEventListener('click', function() {
    questionPalette.classList.toggle('open');
    this.textContent = questionPalette.classList.contains('open') ? '📋 Close' : '📋 Navigator';
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
      if (!nextBtn.disabled && !nextBtn.classList.contains('hidden')) goToNext();
    }
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
      if (!prevBtn.disabled) goToPrev();
    }
    if (e.key === 'f' || e.key === 'F') { toggleFlag(); }
  });

  loadQuestion(0);
});
</script>
</body>
</html>
